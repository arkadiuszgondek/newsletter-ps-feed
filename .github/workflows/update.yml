name: Update RSS Feed

on:
  schedule:
    # Codziennie 8:00-12:00 CEST (06:00-10:00 UTC) co 20 minut
    - cron: '0,20,40 6-9 * * *'
    - cron: '0 10 * * *'          # 12:00 CEST (ostatni z okna intensywnego)

    # Poza oknem: co godzinę przez całą dobę
    - cron: '0 0-5,11-23 * * *'

  workflow_dispatch:

concurrency:
  group: rss-feed-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed generator
        run: python rss_merge.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/rss.xml cache.json
          git diff --cached --quiet && echo "No changes, skipping" && exit 0
          git commit -m "Automated update $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
